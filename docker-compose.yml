# ============================================================================
#  TorBox Media Server - Docker Compose
#  This file is version-controlled in the repo. Do NOT edit manually.
#  Re-run setup.sh to regenerate after updates.
# ============================================================================

networks:
  media-network:
    driver: bridge

services:
  # ── Decypharr ──────────────────────────────────────────────────
  # Mocks qBittorrent API for Radarr/Sonarr, connects to TorBox,
  # handles WebDAV mounting via built-in rclone, and creates symlinks.
  decypharr:
    image: ghcr.io/sirrobot01/decypharr:v2.0
    container_name: decypharr
    restart: unless-stopped
    networks:
      - media-network
    ports:
      - "127.0.0.1:8282:8282"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=002
    volumes:
      - "${CONFIG_DIR}/decypharr/config.json:/app/config.json:ro"
      - "${MOUNT_DIR}:/mnt/remote:rshared"
      - "${DATA_DIR}:/data"
    devices:
      - /dev/fuse:/dev/fuse:rwm
    cap_add:
      - SYS_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8282"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      # Harmless on systems without AppArmor (e.g. CachyOS)
      - apparmor:unconfined

  # ── Prowlarr ───────────────────────────────────────────────────
  # Indexer manager - feeds search results to Radarr & Sonarr.
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.1.3
    container_name: prowlarr
    restart: unless-stopped
    networks:
      - media-network
    ports:
      - "127.0.0.1:9696:9696"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      byparr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - "${CONFIG_DIR}/prowlarr:/config"

  # ── Byparr ────────────────────────────────────────────────────
  # Cloudflare bypass proxy (Byparr - drop-in FlareSolverr replacement).
  byparr:
    image: ghcr.io/thephaseless/byparr:1.2.2
    container_name: byparr
    restart: unless-stopped
    networks:
      - media-network
    ports:
      - "127.0.0.1:8191:8191"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - TZ=${TZ}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8191"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Radarr ─────────────────────────────────────────────────────
  # Movie management - searches, grabs, and organizes movies.
  # Uses Decypharr as its download client (qBittorrent mock).
  radarr:
    image: lscr.io/linuxserver/radarr:5.22.4
    container_name: radarr
    restart: unless-stopped
    networks:
      - media-network
    ports:
      - "127.0.0.1:7878:7878"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      decypharr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - "${CONFIG_DIR}/radarr:/config"
      - "${DATA_DIR}:/data"
      - "${MOUNT_DIR}:/mnt/remote:rslave"

  # ── Sonarr ─────────────────────────────────────────────────────
  # TV show management - searches, grabs, and organizes series.
  # Uses Decypharr as its download client (qBittorrent mock).
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.14
    container_name: sonarr
    restart: unless-stopped
    networks:
      - media-network
    ports:
      - "127.0.0.1:8989:8989"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      decypharr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - "${CONFIG_DIR}/sonarr:/config"
      - "${DATA_DIR}:/data"
      - "${MOUNT_DIR}:/mnt/remote:rslave"

  # ── Seerr ───────────────────────────────────────────────────────
  # Media request & discovery frontend.
  seerr:
    image: ghcr.io/seerr-team/seerr:2.4.1
    container_name: seerr
    user: "${PUID}:${PGID}"
    restart: unless-stopped
    networks:
      - media-network
    ports:
      - "127.0.0.1:5055:5055"
    environment:
      - TZ=${TZ}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5055"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - "${CONFIG_DIR}/seerr:/app/config"

  # ── Plex ───────────────────────────────────────────────────────
  # Media server option 1 - streams your library to any device.
  # Activated via COMPOSE_PROFILES=plex in .env
  plex:
    image: lscr.io/linuxserver/plex:1.41.5
    profiles: ["plex"]
    container_name: plex
    restart: unless-stopped
    networks:
      - media-network
    ports:
      - "127.0.0.1:32400:32400"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM:-}
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:32400/identity || curl -sf http://localhost:32400/identity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - "${CONFIG_DIR}/plex:/config"
      - "${DATA_DIR}:/data"
      - "${MOUNT_DIR}:/mnt/remote:rslave"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Jellyfin ───────────────────────────────────────────────────
  # Media server option 2 (open-source) - streams your library.
  # Activated via COMPOSE_PROFILES=jellyfin in .env
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:10.10.7
    profiles: ["jellyfin"]
    container_name: jellyfin
    restart: unless-stopped
    networks:
      - media-network
    ports:
      - "127.0.0.1:8096:8096"
      - "127.0.0.1:8920:8920"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - JELLYFIN_PublishedServerUrl=http://localhost:8096
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - "${CONFIG_DIR}/jellyfin:/config"
      - "${DATA_DIR}:/data"
      - "${MOUNT_DIR}:/mnt/remote:rslave"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
